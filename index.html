<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클리니파이 | 에어컨 세척 무료 견적 신청</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 2rem 1rem; }
.cf-wrap { max-width: 480px; margin: 0 auto; }
.cf-logo { text-align: center; margin-bottom: 2rem; }
.cf-logo-mark { display: inline-flex; align-items: center; gap: 8px; }
.cf-logo-icon { width: 36px; height: 36px; background: #1D9E75; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.cf-logo-text { font-size: 22px; font-weight: 600; color: #111; letter-spacing: -0.5px; }
.cf-logo-sub { font-size: 12px; color: #888; margin-top: 4px; }
.cf-card { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.cf-section-title { font-size: 11px; font-weight: 600; color: #0F6E56; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.8px; }
.cf-field { margin-bottom: 1rem; }
.cf-field:last-child { margin-bottom: 0; }
.cf-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
.cf-required { color: #D85A30; margin-left: 2px; }
.cf-input, .cf-textarea { width: 100%; padding: 10px 12px; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; color: #111; background: #f9f9f7; border: 1px solid #e0e0dc; border-radius: 8px; outline: none; transition: border-color 0.15s; }
.cf-input:focus, .cf-textarea:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
.cf-textarea { resize: vertical; min-height: 80px; }
.cf-chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.cf-chip { padding: 7px 14px; font-size: 13px; color: #666; background: #f5f5f3; border: 1px solid #e0e0dc; border-radius: 20px; cursor: pointer; transition: all 0.15s; user-select: none; }
.cf-chip:hover { border-color: #1D9E75; color: #0F6E56; }
.cf-chip.active { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 600; }
.cf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cf-counter { display: flex; align-items: center; gap: 12px; }
.cf-counter-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #e0e0dc; background: #f5f5f3; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #111; transition: all 0.15s; line-height: 1; }
.cf-counter-btn:hover { border-color: #1D9E75; color: #0F6E56; }
.cf-counter-val { font-size: 18px; font-weight: 600; min-width: 28px; text-align: center; color: #111; }
.cf-submit { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
.cf-submit:hover { background: #0F6E56; }
.cf-note { font-size: 12px; color: #aaa; text-align: center; margin-top: 0.75rem; }
.cf-divider { height: 1px; background: #f0f0ee; margin: 1rem 0; }
.cf-success { display: none; text-align: center; padding: 3rem 1rem; background: #fff; border-radius: 12px; }
.cf-success-icon { width: 56px; height: 56px; background: #E1F5EE; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.cf-success-title { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 8px; }
.cf-success-desc { font-size: 14px; color: #666; line-height: 1.6; }
</style>
</head>
<body>
<div class="cf-wrap">
  <div class="cf-logo">
    <div class="cf-logo-mark">
      <div class="cf-logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 3C7 3 5 5.5 5 8c0 3 3 6 5 8 2-2 5-5 5-8 0-2.5-2-5-5-5z" fill="white" opacity="0.9"/>
          <circle cx="10" cy="8" r="2" fill="#1D9E75"/>
        </svg>
      </div>
      <span class="cf-logo-text">cleanify</span>
    </div>
    <div class="cf-logo-sub">에어컨 세척 무료 견적 신청</div>
  </div>

  <div id="form-wrap">
    <div class="cf-card">
      <div class="cf-section-title">에어컨 종류</div>
      <div class="cf-field">
        <label class="cf-label">유형 선택 <span class="cf-required">*</span></label>
        <div class="cf-chip-group" id="type-group">
          <div class="cf-chip" onclick="toggleChip(this,'type')">벽걸이</div>
          <div class="cf-chip" onclick="toggleChip(this,'type')">스탠드</div>
          <div class="cf-chip" onclick="toggleChip(this,'type')">2in1</div>
          <div class="cf-chip" onclick="toggleChip(this,'type')">천정형 가정용</div>
          <div class="cf-chip" onclick="toggleChip(this,'type')">천정형 사무용</div>
          <div class="cf-chip" onclick="toggleChip(this,'type')">위니아 천정형</div>
        </div>
      </div>
      <div class="cf-divider"></div>
      <div class="cf-field">
        <label class="cf-label">대수 <span class="cf-required">*</span></label>
        <div class="cf-counter">
          <button class="cf-counter-btn" onclick="changeCount(-1)">−</button>
          <span class="cf-counter-val" id="count-val">1</span>
          <button class="cf-counter-btn" onclick="changeCount(1)">+</button>
        </div>
      </div>
      <div class="cf-divider"></div>
      <div class="cf-field">
        <label class="cf-label">특수 모델 해당 여부</label>
        <div class="cf-chip-group" id="special-group">
          <div class="cf-chip" onclick="toggleChip(this,'special')">엘지로봇</div>
          <div class="cf-chip" onclick="toggleChip(this,'special')">갤러리</div>
          <div class="cf-chip" onclick="toggleChip(this,'special')">무풍3구</div>
          <div class="cf-chip" onclick="toggleChip(this,'special')">삼성제로1</div>
          <div class="cf-chip" onclick="toggleChip(this,'special')">미켈란젤로</div>
          <div class="cf-chip" onclick="toggleChip(this,'special')">해당없음</div>
        </div>
      </div>
    </div>

    <div class="cf-card">
      <div class="cf-section-title">방문 정보</div>
      <div class="cf-row">
        <div class="cf-field">
          <label class="cf-label">지역 <span class="cf-required">*</span></label>
          <input class="cf-input" type="text" placeholder="예: 김포 장기동" id="region">
        </div>
        <div class="cf-field">
          <label class="cf-label">희망 날짜</label>
          <input class="cf-input" type="date" id="date">
        </div>
      </div>
      <div class="cf-field">
        <label class="cf-label">시간대 선호</label>
        <div class="cf-chip-group" id="time-group">
          <div class="cf-chip" onclick="toggleChip(this,'time')">오전(9~12시)</div>
          <div class="cf-chip" onclick="toggleChip(this,'time')">오후(12~17시)</div>
          <div class="cf-chip" onclick="toggleChip(this,'time')">저녁(17시 이후)</div>
        </div>
      </div>
    </div>

    <div class="cf-card">
      <div class="cf-section-title">연락처</div>
      <div class="cf-field">
        <label class="cf-label">이름 <span class="cf-required">*</span></label>
        <input class="cf-input" type="text" placeholder="홍길동" id="name">
      </div>
      <div class="cf-field">
        <label class="cf-label">연락처 <span class="cf-required">*</span></label>
        <input class="cf-input" type="tel" placeholder="010-0000-0000" id="phone">
      </div>
      <div class="cf-field">
        <label class="cf-label">추가 문의사항</label>
        <textarea class="cf-textarea" placeholder="특이사항이나 궁금한 점을 적어주세요." id="memo"></textarea>
      </div>
    </div>

    <div style="background:#E1F5EE;border:1px solid #1D9E75;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#0F6E56;line-height:1.6;">신청 버튼을 누르면 새 탭에 구글 폼이 자동으로 열립니다.<br>내용을 확인하신 후 구글 폼 하단의 <b>제출</b> 버튼을 눌러주세요.</div><button class="cf-submit" onclick="submitForm()">무료 견적 신청하기</button>
    <p class="cf-note">접수 후 영업일 기준 1일 이내 연락드립니다.</p>
  </div>

  <div class="cf-success" id="success-wrap">
    <div class="cf-success-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="#1D9E75"/>
        <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cf-success-title">견적 신청이 완료됐습니다</div>
    <div class="cf-success-desc">구글 폼이 새 탭에 열립니다.<br>내용 확인 후 제출 버튼을 눌러주세요.</div>
  </div>
</div>

<script>
const VIEWFORM = "https://docs.google.com/forms/d/e/1FAIpQLSdo6rwQqerzUBeXjVYEXp9rMFGWYXguOIEcJPS99MpCXfAARg/viewform";

const ENTRY = {
  name:    "entry.823388570",
  phone:   "entry.779023184",
  region:  "entry.82353120",
  type:    "entry.324134475",
  count:   "entry.2110133744",
  special: "entry.2024609800",
  time:    "entry.1174882794",
  memo:    "entry.278506186",
  date_y:  "entry.283588790_year",
  date_m:  "entry.283588790_month",
  date_d:  "entry.283588790_day"
};

let count = 1;

function changeCount(delta) {
  count = Math.max(1, Math.min(10, count + delta));
  document.getElementById('count-val').textContent = count;
}

function toggleChip(el, group) {
  const isSingle = ['type','time'].includes(group);
  if (isSingle) {
    document.querySelectorAll('#' + group + '-group .cf-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  } else {
    el.classList.toggle('active');
  }
}

function submitForm() {
  const name   = document.getElementById('name').value.trim();
  const phone  = document.getElementById('phone').value.trim();
  const region = document.getElementById('region').value.trim();
  const type   = document.querySelector('#type-group .cf-chip.active');

  if (!name || !phone || !region || !type) {
    alert('이름, 연락처, 지역, 에어컨 유형은 필수입니다.');
    return;
  }

  const specials = [...document.querySelectorAll('#special-group .cf-chip.active')].map(c => c.textContent);
  const time     = document.querySelector('#time-group .cf-chip.active')?.textContent || '';
  const memo     = document.getElementById('memo').value.trim();
  const dateVal  = document.getElementById('date').value;

  const params = new URLSearchParams();
  params.set(ENTRY.name,   name);
  params.set(ENTRY.phone,  phone);
  params.set(ENTRY.region, region);
  params.set(ENTRY.type,   type.textContent);
  params.set(ENTRY.count,  String(count));
  specials.forEach(s => params.append(ENTRY.special, s));
  if (!specials.length) params.set(ENTRY.special, '해당없음');
  if (time) params.set(ENTRY.time, time);
  if (memo) params.set(ENTRY.memo, memo);

  if (dateVal) {
    const p = dateVal.split('-');
    params.set(ENTRY.date_y, p[0]);
    params.set(ENTRY.date_m, p[1]);
    params.set(ENTRY.date_d, p[2]);
  }

  const url = VIEWFORM + "?" + params.toString();
  window.open(url, '_blank');

  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('success-wrap').style.display = 'block';
}
</script>
</body>
</html>
